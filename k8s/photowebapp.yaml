apiVersion: v1
kind: Namespace
metadata:
  name: photowebapp
---
apiVersion: v1
kind: Secret
metadata:
  name: photowebapp-secrets
  namespace: photowebapp
type: Opaque
stringData:
  MYSQL_DATABASE: photowebapp
  MYSQL_USER: photouser
  MYSQL_PASSWORD: photopass
  MYSQL_ROOT_PASSWORD: rootpass
  SECRET_KEY: backend-secret-key
  FLASK_SECRET_KEY: frontend-secret-key
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: photowebapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: photowebapp
spec:
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: photowebapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: photowebapp-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5001
          env:
            - name: DATABASE_URL
              value: mysql+pymysql://photouser:photopass@mysql:3306/photowebapp
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: SECRET_KEY
            - name: UPLOAD_FOLDER
              value: /data/uploads
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
      volumes:
        - name: uploads
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: photowebapp
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: photowebapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: photowebapp-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: BACKEND_URL
              value: http://backend:5001
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: FLASK_SECRET_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: photowebapp
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
