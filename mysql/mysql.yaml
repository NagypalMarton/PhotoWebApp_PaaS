apiVersion: v1
kind: Secret
metadata:
  name: photowebapp-secrets
type: Opaque
stringData:
  # IMPORTANT: Replace every CHANGE_THIS_* value with a strong secret
  # before applying this file. After applying, update the values via
  # OpenShift Console -> Workloads -> Secrets -> photowebapp-secrets -> Edit Secret.
  MYSQL_DATABASE: photowebapp
  MYSQL_USER: photouser
  MYSQL_PASSWORD: CHANGE_THIS_STRONG_PASSWORD
  MYSQL_ROOT_PASSWORD: CHANGE_THIS_ROOT_PASSWORD
  SECRET_KEY: CHANGE_THIS_BACKEND_SECRET_KEY
  FLASK_SECRET_KEY: CHANGE_THIS_FRONTEND_SECRET_KEY
  # Keep DATABASE_URL in sync with MYSQL_USER / MYSQL_PASSWORD above.
  DATABASE_URL: mysql+pymysql://photouser:CHANGE_THIS_STRONG_PASSWORD@mysql:3306/photowebapp
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
