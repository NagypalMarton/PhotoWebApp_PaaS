{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card">
      <div class="card-body">
        <h1 class="h4 mb-3">{% if mode == 'login' %}Belépés{% else %}Regisztráció{% endif %}</h1>
        <form method="post" class="d-grid gap-3">
          <input class="form-control" type="text" name="username" minlength="3" maxlength="80" placeholder="Felhasználónév" required>
          <input class="form-control" type="password" name="password" minlength="6" placeholder="Jelszó" required>
          <button class="btn btn-primary" type="submit">{% if mode == 'login' %}Belépés{% else %}Regisztráció{% endif %}</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
