apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: photowebapp
    component: backend
    deployment: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: photowebapp
      component: backend
      deployment: backend
  template:
    metadata:
      labels:
        app: photowebapp
        component: backend
        deployment: backend
    spec:
      containers:
        - name: backend
          image: docker.io/nagypalmarton/photowebapp-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: photowebapp-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: photowebapp-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: photowebapp-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: photowebapp-app-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: photowebapp-app-secret
                  key: DB_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: photowebapp-app-secret
                  key: SECRET_KEY
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: photowebapp-uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: photowebapp
    component: backend
    deployment: backend
spec:
  selector:
    app: photowebapp
    component: backend
    deployment: backend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: photowebapp
    component: frontend
    deployment: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: photowebapp
      component: frontend
      deployment: frontend
  template:
    metadata:
      labels:
        app: photowebapp
        component: frontend
        deployment: frontend
    spec:
      containers:
        - name: frontend
          image: docker.io/nagypalmarton/photowebapp-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: photowebapp
    component: frontend
    deployment: frontend
spec:
  selector:
    app: photowebapp
    component: frontend
    deployment: frontend
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: photowebapp
  labels:
    app: photowebapp
spec:
  to:
    kind: Service
    name: frontend
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
