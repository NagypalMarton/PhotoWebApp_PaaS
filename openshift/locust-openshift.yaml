# Locust runtime configuration for OpenShift
# Assumes locust:latest ImageStreamTag exists (from openshift/locust-image.yaml).

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
  labels:
    app: locust
    component: master
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"locust:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"locust-master\")].image"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust
      component: master
  template:
    metadata:
      labels:
        app: locust
        component: master
    spec:
      containers:
        - name: locust-master
          image: locust:latest
          args: ["-f", "/app/locustfile.py", "--master"]
          ports:
            - name: web-ui
              containerPort: 8089
            - name: worker-comm
              containerPort: 5557
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
  labels:
    app: locust
    component: worker
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"locust:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"locust-worker\")].image"}]'
spec:
  replicas: 2
  selector:
    matchLabels:
      app: locust
      component: worker
  template:
    metadata:
      labels:
        app: locust
        component: worker
    spec:
      containers:
        - name: locust-worker
          image: locust:latest
          args: ["-f", "/app/locustfile.py", "--worker", "--master-host", "locust-master"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi

---
apiVersion: v1
kind: Service
metadata:
  name: locust-master
  labels:
    app: locust
spec:
  selector:
    app: locust
    component: master
  ports:
    - name: web-ui
      port: 8089
      targetPort: web-ui
    - name: worker-comm
      port: 5557
      targetPort: worker-comm

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: locust
  labels:
    app: locust
spec:
  to:
    kind: Service
    name: locust-master
  port:
    targetPort: web-ui
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
