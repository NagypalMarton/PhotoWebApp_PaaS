# Locust Build Configuration for OpenShift
# ==============================================================================
# This file builds a Locust image from the local locustfile.py
# and pushes it to the OpenShift Image Registry.
# ==============================================================================

---
# Shared webhook secret for BuildConfig GitHub trigger
apiVersion: v1
kind: Secret
metadata:
  name: photowebapp-webhook-secret
type: Opaque
stringData:
  WebHookSecretKey: CHANGE_THIS_WEBHOOK_SECRET

---
# BuildConfig for Locust image (using Docker strategy)
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: locust-build
  labels:
    app: locust
spec:
  source:
    type: Git
    git:
      uri: "https://github.com/NagypalMarton/PhotoWebApp_PaaS.git"
      ref: "main"
    contextDir: "locust"
  strategy:
    type: Docker
    dockerStrategy: {}
  output:
    to:
      kind: ImageStreamTag
      name: locust:latest
  triggers:
    - type: GitHub
      github:
        secretReference:
          name: photowebapp-webhook-secret
    - type: ConfigChange
    - type: ImageChange

---
# ImageStream for Locust
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: locust
  labels:
    app: locust
spec:
  lookupPolicy:
    local: true
