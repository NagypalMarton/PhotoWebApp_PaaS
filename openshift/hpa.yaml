# HorizontalPodAutoscaler – Frontend
# CPU-kihasználtság alapján skálázódik 1–5 replika között.
# A skálázás feltétele: a Deployment CPU request értéke legyen beállítva
# (frontend.yaml: 50m request / 200m limit).
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# HorizontalPodAutoscaler – Backend
# Megjegyzés: az uploads-pvc ReadWriteOnce hozzáférési módban van.
# Ha a storage class támogat ReadWriteMany-t (pl. CephFS), módosítsd a PVC-t
# backend.yaml-ban, hogy a feltöltött fájlok minden replikában elérhetők legyenek.
# Az autentikáció és az adatbázis-műveletek RWO esetén is párhuzamosan futnak.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
