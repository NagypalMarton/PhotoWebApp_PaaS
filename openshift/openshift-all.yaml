apiVersion: v1
kind: Secret
metadata:
  name: photowebapp-secrets
type: Opaque
stringData:
  # IMPORTANT: Replace every CHANGE_THIS_* value with a strong secret
  # before applying this file. After applying, update the values via
  # OpenShift Console -> Workloads -> Secrets -> photowebapp-secrets -> Edit Secret.
  MYSQL_DATABASE: photowebapp
  MYSQL_USER: photouser
  MYSQL_PASSWORD: CHANGE_THIS_STRONG_PASSWORD
  MYSQL_ROOT_PASSWORD: CHANGE_THIS_ROOT_PASSWORD
  SECRET_KEY: CHANGE_THIS_BACKEND_SECRET_KEY
  FLASK_SECRET_KEY: CHANGE_THIS_FRONTEND_SECRET_KEY
  # Keep DATABASE_URL in sync with MYSQL_USER / MYSQL_PASSWORD above.
  DATABASE_URL: mysql+pymysql://photouser:CHANGE_THIS_STRONG_PASSWORD@mysql:3306/photowebapp
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: registry.access.redhat.com/rhscl/mysql-80-rhel7
          ports:
            - containerPort: 3306
          resources:
            requests:
              cpu: 50m       # Low request to trigger scaling with small load
              memory: 64Mi   # Low memory request
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: MYSQL_ROOT_PASSWORD
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
spec:
  selector:
    app: mysql
  ports:
    - protocol: TCP
      port: 3306
      targetPort: 3306
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z mysql 3306; do echo waiting for mysql; sleep 2; done;']
      containers:
        - name: backend
          image: nagypalmarton/photowebapp-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5001
          resources:
            requests:
              cpu: 50m       # Low request to trigger scaling with small load
              memory: 64Mi   # Low memory request
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: SECRET_KEY
            - name: UPLOAD_FOLDER
              value: /data/uploads
          volumeMounts:
            - name: uploads
              mountPath: /data/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 5001
      targetPort: 5001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      initContainers:
        - name: wait-for-backend
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z backend 5001; do echo waiting for backend; sleep 2; done;']
      containers:
        - name: frontend
          image: nagypalmarton/photowebapp-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          resources:
            requests:
              cpu: 50m       # Low request to trigger scaling with small load
              memory: 64Mi   # Low memory request
            limits:
              cpu: 200m
              memory: 256Mi
          env:
            - name: BACKEND_URL
              value: http://backend:5001
            - name: FLASK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: photowebapp-secrets
                  key: FLASK_SECRET_KEY
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: frontend
spec:
  to:
    kind: Service
    name: frontend
  port:
    targetPort: 5000
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
# ==============================================================================
# HPA - Horizontal Pod Autoscaler (Task 2 - Automatic Scaling)
# ==============================================================================
# Frontend HPA - scales 1-5 replicas based on CPU utilization (target: 30%)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 30  # Lower target to trigger scaling with small load
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
---
# ==============================================================================
# Locust - Cloud Load Test (separate app in the same OpenShift project)
# Targets frontend service to exercise full PaaS flow: frontend -> backend -> mysql
# ==============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: photowebapp-webhook-secret
type: Opaque
stringData:
  WebHookSecretKey: CHANGE_THIS_WEBHOOK_SECRET
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: locust
spec:
  lookupPolicy:
    local: true
---
apiVersion: build.openshift.io/v1
kind: BuildConfig
metadata:
  name: locust-build
spec:
  runPolicy: Serial
  source:
    type: Git
    git:
      uri: https://github.com/NagypalMarton/PhotoWebApp_PaaS.git
      ref: main
    contextDir: locust
  strategy:
    type: Docker
    dockerStrategy: {}
  output:
    to:
      kind: ImageStreamTag
      name: locust:latest
  triggers:
    - type: GitHub
      github:
        secretReference:
          name: photowebapp-webhook-secret
    - type: ImageChange
    - type: ConfigChange
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"locust:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"locust-master\")].image"}]'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust
      component: master
  template:
    metadata:
      labels:
        app: locust
        component: master
    spec:
      containers:
        - name: locust-master
          image: locust:latest
          args: ["-f", "/app/locustfile.py", "--master", "--host", "http://backend:5001"]
          ports:
            - containerPort: 8089
            - containerPort: 5557
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
  annotations:
    image.openshift.io/triggers: '[{"from":{"kind":"ImageStreamTag","name":"locust:latest"},"fieldPath":"spec.template.spec.containers[?(@.name==\"locust-worker\")].image"}]'
spec:
  replicas: 2
  selector:
    matchLabels:
      app: locust
      component: worker
  template:
    metadata:
      labels:
        app: locust
        component: worker
    spec:
      containers:
        - name: locust-worker
          image: locust:latest
          args: ["-f", "/app/locustfile.py", "--worker", "--master-host", "locust-master"]
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: locust-master
spec:
  selector:
    app: locust
    component: master
  ports:
    - name: web-ui
      port: 8089
      targetPort: 8089
    - name: worker
      port: 5557
      targetPort: 5557
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: locust
spec:
  to:
    kind: Service
    name: locust-master
  port:
    targetPort: web-ui
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
---
# Backend HPA - scales 1-5 replicas based on CPU utilization (target: 30%)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 30  # Lower target to trigger scaling with small load
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Pods
          value: 2
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
