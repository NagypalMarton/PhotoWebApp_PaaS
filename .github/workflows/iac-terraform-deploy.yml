name: Deploy to OpenShift via Terraform

on:
  workflow_run:
    workflows:
      - Build and Push Docker Hub Images
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (default: short SHA)"
        required: false
        type: string

env:
  TF_IN_AUTOMATION: true

concurrency:
  group: terraform-openshift-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Validate required secrets
        shell: bash
        run: |
          required=(
            OPENSHIFT_SERVER
            OPENSHIFT_TOKEN
            DOCKERHUB_USERNAME
            DOCKERHUB_TOKEN
            TF_API_TOKEN
            MYSQL_PASSWORD
            MYSQL_ROOT_PASSWORD
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing repository secret: ${key}" >&2
              exit 1
            fi
          done
        env:
          OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
          OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}

      - name: Set deployment tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SOURCE_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SOURCE_SHA="${GITHUB_SHA}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${SOURCE_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Terraform init
        working-directory: infra/terraform
        shell: bash
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_openshift_server: ${{ secrets.OPENSHIFT_SERVER }}
          TF_VAR_openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          TF_VAR_openshift_ca_cert: ${{ secrets.OPENSHIFT_CA_CERT }}
          TF_VAR_namespace: ${{ vars.OPENSHIFT_NAMESPACE || secrets.OPENSHIFT_NAMESPACE || 'photowebapp' }}
        run: |
          set -euo pipefail
          
          # Normalize variables
          TF_VAR_openshift_server="$(printf '%s' "${TF_VAR_openshift_server}" | tr -d '\r\n' | xargs)"
          TF_VAR_openshift_token="$(printf '%s' "${TF_VAR_openshift_token}" | tr -d '\r\n' | xargs)"
          TF_VAR_namespace="$(printf '%s' "${TF_VAR_namespace}" | tr -d '\r\n' | xargs)"
          TF_VAR_openshift_ca_cert="$(printf '%s' "${TF_VAR_openshift_ca_cert}" | tr -d '\r')"
          
          export TF_VAR_openshift_server TF_VAR_openshift_token TF_VAR_namespace TF_VAR_openshift_ca_cert
          
          echo "DEBUG: TF_VAR_openshift_server=${TF_VAR_openshift_server}"
          echo "DEBUG: TF_VAR_namespace=${TF_VAR_namespace}"
          echo "DEBUG: TF_VAR_openshift_ca_cert=${TF_VAR_openshift_ca_cert:0:50}..."
          
          terraform init -input=false
          
          echo "Validating Terraform configuration..."
          terraform validate

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.4

      - name: Setup kubeconfig
        uses: ./.github/actions/setup-openshift-kubeconfig
        with:
          openshift-server: ${{ secrets.OPENSHIFT_SERVER }}
          openshift-token: ${{ secrets.OPENSHIFT_TOKEN }}
          openshift-ca-cert: ${{ secrets.OPENSHIFT_CA_CERT }}
          openshift-namespace: ${{ vars.OPENSHIFT_NAMESPACE || secrets.OPENSHIFT_NAMESPACE || 'photowebapp' }}

      - name: Preflight OpenShift access and RBAC
        shell: bash
        run: |
          set -euo pipefail

          KCMD=(kubectl --kubeconfig "${KUBECONFIG_FILE}")

          echo "Checking API reachability..."
          if ! "${KCMD[@]}" version --request-timeout=15s >/dev/null 2>&1; then
            echo "Cannot authenticate to OpenShift API with provided token/server." >&2
            echo "Verify OPENSHIFT_SERVER points to the correct cluster and OPENSHIFT_TOKEN is valid (not expired/revoked)." >&2
            exit 1
          fi

          echo "Verifying token can access namespace ${OPENSHIFT_NAMESPACE}..."
          if ! "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" auth can-i get pods >/dev/null; then
            echo "Token cannot access namespace ${OPENSHIFT_NAMESPACE}. Check OPENSHIFT_TOKEN and OPENSHIFT_NAMESPACE." >&2
            exit 1
          fi

          required=(
            "create serviceaccounts"
            "create secrets"
            "create services"
            "create deployments.apps"
            "create persistentvolumeclaims"
            "create networkpolicies.networking.k8s.io"
            "create horizontalpodautoscalers.autoscaling"
            "create routes.route.openshift.io"
          )

          missing=0
          for rule in "${required[@]}"; do
            verb="${rule%% *}"
            resource="${rule#* }"
            if ! "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" auth can-i "${verb}" "${resource}" >/dev/null; then
              echo "Missing permission: ${verb} ${resource} in namespace ${OPENSHIFT_NAMESPACE}" >&2
              missing=1
            fi
          done

          if [ "${missing}" -ne 0 ]; then
            echo "OpenShift RBAC preflight failed. Grant namespace role edit/admin (or equivalent custom role), then rerun." >&2
            exit 1
          fi

      - name: Prune stale ReplicaSets
        shell: bash
        run: |
          set -euo pipefail

          KCMD=(kubectl --kubeconfig "${KUBECONFIG_FILE}")

          echo "Pruning stale ReplicaSets to free quota..."
            RS_JSON_FILE="${RUNNER_TEMP}/replicasets.json"
            "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get rs -o json > "${RS_JSON_FILE}"

            OPENSHIFT_NAMESPACE="${OPENSHIFT_NAMESPACE}" KUBECONFIG_FILE="${KUBECONFIG_FILE}" python3 scripts/prune_stale_replicasets.py "${RS_JSON_FILE}"

          echo "ReplicaSet pruning completed."

      - name: Terraform apply
        working-directory: infra/terraform
        shell: bash
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_openshift_server: ${{ secrets.OPENSHIFT_SERVER }}
          TF_VAR_openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          TF_VAR_openshift_ca_cert: ${{ secrets.OPENSHIFT_CA_CERT }}
          TF_VAR_namespace: ${{ vars.OPENSHIFT_NAMESPACE || secrets.OPENSHIFT_NAMESPACE || 'photowebapp' }}
          TF_VAR_mysql_database: photowebapp
          TF_VAR_mysql_user: photouser
          TF_VAR_mysql_password: ${{ secrets.MYSQL_PASSWORD }}
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_dockerhub_token: ${{ secrets.DOCKERHUB_TOKEN }}
          TF_VAR_backend_secret_key: ${{ secrets.BACKEND_SECRET_KEY || '' }}
          TF_VAR_frontend_secret_key: ${{ secrets.FRONTEND_SECRET_KEY || '' }}
          TF_VAR_enable_hpa: ${{ vars.ENABLE_HPA || 'true' }}
          TF_VAR_backend_image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/photowebapp-backend:${{ steps.tag.outputs.value }}
          TF_VAR_frontend_image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/photowebapp-frontend:${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail

          TF_VAR_openshift_server="$(printf '%s' "${TF_VAR_openshift_server}" | tr -d '\r\n' | xargs)"
          TF_VAR_openshift_token="$(printf '%s' "${TF_VAR_openshift_token}" | tr -d '\r\n' | xargs)"
          TF_VAR_namespace="$(printf '%s' "${TF_VAR_namespace}" | tr -d '\r\n' | xargs)"
          TF_VAR_openshift_ca_cert="$(printf '%s' "${TF_VAR_openshift_ca_cert}" | tr -d '\r')"

          TF_VAR_openshift_token="${TF_VAR_openshift_token#Bearer }"
          TF_VAR_openshift_token="${TF_VAR_openshift_token#bearer }"
          TF_VAR_openshift_token="${TF_VAR_openshift_token%\"}"
          TF_VAR_openshift_token="${TF_VAR_openshift_token#\"}"
          TF_VAR_openshift_token="${TF_VAR_openshift_token%\'}"
          TF_VAR_openshift_token="${TF_VAR_openshift_token#\'}"

          export TF_VAR_openshift_server TF_VAR_openshift_token TF_VAR_namespace TF_VAR_openshift_ca_cert

          if [ -z "${TF_VAR_openshift_server}" ] || [[ ! "${TF_VAR_openshift_server}" =~ ^https?:// ]]; then
            echo "TF_VAR_openshift_server is empty or invalid: '${TF_VAR_openshift_server}'" >&2
            exit 1
          fi

          if [ -z "${TF_VAR_openshift_token}" ]; then
            echo "TF_VAR_openshift_token is empty after normalization" >&2
            exit 1
          fi

          # Validate MySQL image input constraints early to avoid pod crashloop.
          if ! printf '%s' "${TF_VAR_mysql_database:-}" | grep -Eq '^[A-Za-z0-9_]+$'; then
            echo "Invalid TF_VAR_mysql_database. Must match: ^[A-Za-z0-9_]+$" >&2
            exit 1
          fi

          if ! printf '%s' "${TF_VAR_mysql_user:-}" | grep -Eq '^[A-Za-z0-9_]+$'; then
            echo "Invalid TF_VAR_mysql_user. Must match: ^[A-Za-z0-9_]+$" >&2
            exit 1
          fi

          if ! printf '%s' "${TF_VAR_mysql_password:-}" | grep -Eq '^[A-Za-z0-9_~!@#$%^&*()=<>,.?;:|+\-]+$'; then
            echo "Invalid TF_VAR_mysql_password. Contains unsupported characters for the MySQL container image." >&2
            exit 1
          fi

          if ! printf '%s' "${TF_VAR_mysql_root_password:-}" | grep -Eq '^[A-Za-z0-9_~!@#$%^&*()=<>,.?;:|+\-]+$'; then
            echo "Invalid TF_VAR_mysql_root_password. Contains unsupported characters for the MySQL container image." >&2
            exit 1
          fi
          
          echo "DEBUG apply: TF_VAR_openshift_server=${TF_VAR_openshift_server}"
          echo "DEBUG apply: TF_VAR_namespace=${TF_VAR_namespace}"

          esc_server="${TF_VAR_openshift_server//\"/\\\"}"
          esc_token="${TF_VAR_openshift_token//\"/\\\"}"
          esc_ca="${TF_VAR_openshift_ca_cert//\"/\\\"}"
          esc_namespace="${TF_VAR_namespace//\"/\\\"}"

          cat > ci.auto.tfvars <<EOF
          openshift_server  = "${esc_server}"
          openshift_token   = "${esc_token}"
          openshift_ca_cert = "${esc_ca}"
          namespace         = "${esc_namespace}"
          EOF

          TF_COMMON_ARGS=(
            "-var-file=ci.auto.tfvars"
          )

          KCMD=(kubectl --kubeconfig "${KUBECONFIG_FILE}")

          # Clean up legacy Route resources from state so apply does not try to destroy via old provider.
          if terraform state show kubectl_manifest.frontend_route >/dev/null 2>&1; then
            echo "Removing legacy state entry: kubectl_manifest.frontend_route"
            terraform state rm kubectl_manifest.frontend_route
          fi

          if terraform state show kubernetes_manifest.frontend_route >/dev/null 2>&1; then
            echo "Removing legacy state entry: kubernetes_manifest.frontend_route"
            terraform state rm kubernetes_manifest.frontend_route
          fi

          adopt_if_exists() {
            local kind="$1"
            local name="$2"
            local address="$3"
            local import_id="${TF_VAR_namespace}/${name}"

            if terraform state show "${address}" >/dev/null 2>&1; then
              echo "State already contains ${address}"
              return
            fi

            if "${KCMD[@]}" -n "${TF_VAR_namespace}" get "${kind}" "${name}" >/dev/null 2>&1; then
              echo "Importing existing ${kind}/${name} into ${address}"
              terraform import "${TF_COMMON_ARGS[@]}" "${address}" "${import_id}"
            else
              echo "${kind}/${name} not found in namespace ${TF_VAR_namespace}, Terraform will create it"
            fi
          }

          adopt_if_exists serviceaccount backend-sa kubernetes_service_account_v1.backend
          adopt_if_exists serviceaccount frontend-sa kubernetes_service_account_v1.frontend
          adopt_if_exists serviceaccount mysql-sa kubernetes_service_account_v1.mysql
          adopt_if_exists secret photowebapp-secrets kubernetes_secret_v1.app_secrets
          adopt_if_exists persistentvolumeclaim mysql-pvc kubernetes_persistent_volume_claim_v1.mysql
          adopt_if_exists service mysql kubernetes_service_v1.mysql
          adopt_if_exists service backend kubernetes_service_v1.backend
          adopt_if_exists service frontend kubernetes_service_v1.frontend
          adopt_if_exists deployment mysql kubernetes_deployment_v1.mysql
          adopt_if_exists deployment backend kubernetes_deployment_v1.backend
          adopt_if_exists deployment frontend kubernetes_deployment_v1.frontend
          adopt_if_exists networkpolicy default-deny-ingress kubernetes_network_policy_v1.default_deny_ingress
          adopt_if_exists networkpolicy allow-mysql-from-backend kubernetes_network_policy_v1.allow_mysql_from_backend
          adopt_if_exists networkpolicy allow-backend-from-frontend kubernetes_network_policy_v1.allow_backend_from_frontend
          adopt_if_exists networkpolicy allow-frontend-from-router kubernetes_network_policy_v1.allow_frontend_from_router

          # Note: kubernetes_manifest Route import skipped due to RBAC (CRD listing not permitted)
          # Terraform will create Route if it doesn't exist, or OpenShift may already have one
          echo "Route creation will be handled by terraform apply (no import needed for kubernetes_manifest)"

          if [ "${TF_VAR_enable_hpa}" = "true" ]; then
            adopt_if_exists horizontalpodautoscaler frontend-hpa kubernetes_horizontal_pod_autoscaler_v2.frontend[0]
            adopt_if_exists horizontalpodautoscaler backend-hpa kubernetes_horizontal_pod_autoscaler_v2.backend[0]
          fi

          terraform apply "${TF_COMMON_ARGS[@]}" -refresh=false -auto-approve

      - name: Create Frontend Route (kubectl)
        shell: bash
        run: |
          set -euo pipefail

          KCMD=(kubectl --kubeconfig "${KUBECONFIG_FILE}")

          # Check if route already exists
          if "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get route frontend >/dev/null 2>&1; then
            echo "Route frontend already exists, skipping creation"
            exit 0
          fi

          echo "Creating frontend route..."
          ROUTE_YAML=$(cat <<'ROUTEEOF'
          apiVersion: route.openshift.io/v1
          kind: Route
          metadata:
            name: frontend
            labels:
              app: photowebapp
          spec:
            to:
              kind: Service
              name: frontend
            port:
              targetPort: http
            tls:
              termination: edge
              insecureEdgeTerminationPolicy: Redirect
          ROUTEEOF
          )

          echo "${ROUTE_YAML}" | "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" apply -f -
          echo "Route frontend created successfully"

      - name: Verify OpenShift resources
        shell: bash
        env:
          ROLLOUT_TIMEOUT: ${{ vars.DEPLOY_ROLLOUT_TIMEOUT || '180s' }}
        run: |
          set -euo pipefail

          KCMD=(kubectl --kubeconfig "${KUBECONFIG_FILE}")

          echo "Using rollout timeout: ${ROLLOUT_TIMEOUT}"

          echo "Checking deployments and services..."
          "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get deployment backend frontend mysql
          "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get service backend frontend mysql

          dump_diagnostics() {
            local deployment_name="$1"
            echo "--- Diagnostics for ${deployment_name} ---"
            "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" describe deployment "${deployment_name}" || true
            "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get pods -o wide || true
            "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get events --sort-by=.lastTimestamp || true

            pods=$("${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get pods -l app="${deployment_name}" -o name 2>/dev/null || true)
            for pod in ${pods}; do
              echo "--- ${pod} describe ---"
              "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" describe "${pod}" || true
              echo "--- ${pod} logs ---"
              "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" logs "${pod}" --all-containers=true --tail=200 || true
            done
          }

          wait_for_rollout() {
            local deployment_name="$1"
            echo "Waiting for rollout of ${deployment_name}..."
            if ! "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" rollout status "deployment/${deployment_name}" --timeout="${ROLLOUT_TIMEOUT}"; then
              echo "Rollout failed for ${deployment_name}" >&2
              dump_diagnostics "${deployment_name}"
              exit 1
            fi
          }

          echo "Waiting for rollout completion..."
          wait_for_rollout mysql
          wait_for_rollout backend
          wait_for_rollout frontend

          echo "Checking PVC state..."
          PVC_PHASE=$("${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get pvc mysql-pvc -o jsonpath='{.status.phase}')
          echo "mysql-pvc phase: ${PVC_PHASE}"
          if [ "${PVC_PHASE}" != "Bound" ]; then
            echo "mysql-pvc is not Bound" >&2
            exit 1
          fi

          echo "Checking HPA objects (optional)..."
          if "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get hpa frontend-hpa backend-hpa >/dev/null 2>&1; then
            "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get hpa frontend-hpa backend-hpa
          else
            echo "HPA resources are not present (possibly disabled via Terraform variable)."
          fi

          echo "Checking frontend route..."
          FRONTEND_HOST=$("${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get route frontend -o jsonpath='{.spec.host}')
          if [ -z "${FRONTEND_HOST}" ]; then
            echo "Frontend route host is empty" >&2
            exit 1
          fi

          echo "Frontend URL: https://${FRONTEND_HOST}"

          {
            echo "## OpenShift Deploy Verification"
            echo "- Namespace: ${OPENSHIFT_NAMESPACE}"
            echo "- Frontend URL: https://${FRONTEND_HOST}"
            echo "- MySQL PVC: ${PVC_PHASE}"
          } >> "${GITHUB_STEP_SUMMARY}"
