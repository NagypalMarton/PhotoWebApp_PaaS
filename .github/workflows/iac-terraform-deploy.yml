name: Deploy to OpenShift via Terraform

on:
  workflow_run:
    workflows:
      - Build and Push Docker Hub Images
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (default: short SHA)"
        required: false
        type: string

env:
  TF_IN_AUTOMATION: true

concurrency:
  group: terraform-openshift-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Validate required secrets
        shell: bash
        run: |
          required=(
            OPENSHIFT_SERVER
            OPENSHIFT_TOKEN
            DOCKERHUB_USERNAME
            TF_API_TOKEN
            MYSQL_PASSWORD
            MYSQL_ROOT_PASSWORD
          )

          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing repository secret: ${key}" >&2
              exit 1
            fi
          done
        env:
          OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
          OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}

      - name: Set deployment tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            SOURCE_SHA="${{ github.event.workflow_run.head_sha }}"
          else
            SOURCE_SHA="${GITHUB_SHA}"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.image_tag }}" ]; then
            echo "value=${{ inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${SOURCE_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Terraform init
        working-directory: infra/terraform
        shell: bash
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
        run: terraform init -input=false

      - name: Terraform apply
        working-directory: infra/terraform
        shell: bash
        env:
          TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
          TF_VAR_openshift_server: ${{ secrets.OPENSHIFT_SERVER }}
          TF_VAR_openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          TF_VAR_openshift_ca_cert: ${{ secrets.OPENSHIFT_CA_CERT }}
          TF_VAR_namespace: ${{ vars.OPENSHIFT_NAMESPACE || 'photowebapp' }}
          TF_VAR_mysql_database: photowebapp
          TF_VAR_mysql_user: photouser
          TF_VAR_mysql_password: ${{ secrets.MYSQL_PASSWORD }}
          TF_VAR_mysql_root_password: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          TF_VAR_backend_secret_key: ${{ secrets.BACKEND_SECRET_KEY || '' }}
          TF_VAR_frontend_secret_key: ${{ secrets.FRONTEND_SECRET_KEY || '' }}
          TF_VAR_enable_hpa: ${{ vars.ENABLE_HPA || 'true' }}
          TF_VAR_backend_image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/photowebapp-backend:${{ steps.tag.outputs.value }}
          TF_VAR_frontend_image: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/photowebapp-frontend:${{ steps.tag.outputs.value }}
        run: terraform apply -auto-approve

      - name: Install kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.29.4

      - name: Verify OpenShift resources
        shell: bash
        env:
          OPENSHIFT_SERVER: ${{ secrets.OPENSHIFT_SERVER }}
          OPENSHIFT_TOKEN: ${{ secrets.OPENSHIFT_TOKEN }}
          OPENSHIFT_CA_CERT: ${{ secrets.OPENSHIFT_CA_CERT }}
          OPENSHIFT_NAMESPACE: ${{ vars.OPENSHIFT_NAMESPACE || 'photowebapp' }}
          ROLLOUT_TIMEOUT: ${{ vars.DEPLOY_ROLLOUT_TIMEOUT || '180s' }}
        run: |
          set -euo pipefail

          KUBECONFIG_FILE="${RUNNER_TEMP}/kubeconfig"

          if [ -n "${OPENSHIFT_CA_CERT}" ]; then
            CA_FILE="${RUNNER_TEMP}/openshift-ca.crt"
            printf '%s\n' "${OPENSHIFT_CA_CERT}" > "${CA_FILE}"
            TLS_LINE="certificate-authority: ${CA_FILE}"
          else
            TLS_LINE="insecure-skip-tls-verify: true"
          fi

          cat > "${KUBECONFIG_FILE}" <<EOF
          apiVersion: v1
          kind: Config
          clusters:
            - name: target
              cluster:
                server: ${OPENSHIFT_SERVER}
                ${TLS_LINE}
          users:
            - name: token-user
              user:
                token: ${OPENSHIFT_TOKEN}
          contexts:
            - name: target-context
              context:
                cluster: target
                user: token-user
                namespace: ${OPENSHIFT_NAMESPACE}
          current-context: target-context
          EOF

          chmod 600 "${KUBECONFIG_FILE}"

          KCMD=(kubectl --kubeconfig "${KUBECONFIG_FILE}")

          echo "Using rollout timeout: ${ROLLOUT_TIMEOUT}"

          echo "Checking deployments and services..."
          "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get deployment backend frontend mysql
          "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get service backend frontend mysql

          echo "Waiting for rollout completion..."
          "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" rollout status deployment/mysql --timeout="${ROLLOUT_TIMEOUT}"
          "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" rollout status deployment/backend --timeout="${ROLLOUT_TIMEOUT}"
          "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" rollout status deployment/frontend --timeout="${ROLLOUT_TIMEOUT}"

          echo "Checking PVC state..."
          PVC_PHASE=$("${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get pvc mysql-pvc -o jsonpath='{.status.phase}')
          echo "mysql-pvc phase: ${PVC_PHASE}"
          if [ "${PVC_PHASE}" != "Bound" ]; then
            echo "mysql-pvc is not Bound" >&2
            exit 1
          fi

          echo "Checking HPA objects (optional)..."
          if "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get hpa frontend-hpa backend-hpa >/dev/null 2>&1; then
            "${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get hpa frontend-hpa backend-hpa
          else
            echo "HPA resources are not present (possibly disabled via Terraform variable)."
          fi

          echo "Checking frontend route..."
          FRONTEND_HOST=$("${KCMD[@]}" -n "${OPENSHIFT_NAMESPACE}" get route frontend -o jsonpath='{.spec.host}')
          if [ -z "${FRONTEND_HOST}" ]; then
            echo "Frontend route host is empty" >&2
            exit 1
          fi

          echo "Frontend URL: https://${FRONTEND_HOST}"

          {
            echo "## OpenShift Deploy Verification"
            echo "- Namespace: ${OPENSHIFT_NAMESPACE}"
            echo "- Frontend URL: https://${FRONTEND_HOST}"
            echo "- MySQL PVC: ${PVC_PHASE}"
          } >> "${GITHUB_STEP_SUMMARY}"
