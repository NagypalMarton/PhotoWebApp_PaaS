name: Render OpenShift Manifest

on:
  push:
  release:
    types:
      - published

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Render openshift manifest
        shell: bash
        env:
          DOCKERHUB_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "${DOCKERHUB_NAMESPACE}" ]; then
            echo "DOCKERHUB namespace is missing (set DOCKERHUB_USERNAME)" >&2
            exit 1
          fi

          sed "s/CHANGE_ME_DOCKERHUB_USERNAME/${DOCKERHUB_NAMESPACE}/g" \
            openshift/openshift-all.yaml > openshift/openshift-all-generated.yaml

          sed "s/CHANGE_ME_DOCKERHUB_USERNAME/${DOCKERHUB_NAMESPACE}/g" \
            openshift/redeploy-app-only.yaml > openshift/redeploy-app-only-generated.yaml

      - name: Commit generated manifest
        shell: bash
        run: |
          if git diff --quiet -- openshift/openshift-all-generated.yaml openshift/redeploy-app-only-generated.yaml; then
            echo "No manifest changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add openshift/openshift-all-generated.yaml openshift/redeploy-app-only-generated.yaml
          git commit -m "chore: render OpenShift manifest from repository secrets"
          git push