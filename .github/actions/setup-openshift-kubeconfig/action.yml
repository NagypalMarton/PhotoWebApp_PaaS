name: Setup OpenShift kubeconfig
description: Normalize OpenShift credentials and create kubeconfig file with kubectl command array

inputs:
  openshift-server:
    description: OpenShift API server URL
    required: true
  openshift-token:
    description: OpenShift authentication token
    required: true
  openshift-ca-cert:
    description: OpenShift CA certificate (optional)
    required: false
    default: ''
  openshift-namespace:
    description: OpenShift namespace
    required: true

outputs:
  kubeconfig-file:
    description: Path to generated kubeconfig file
    value: ${{ steps.setup.outputs.kubeconfig-file }}
  kcmd-array:
    description: kubectl command array with kubeconfig
    value: ${{ steps.setup.outputs.kcmd-array }}

runs:
  using: composite
  steps:
    - id: setup
      shell: bash
      env:
        OPENSHIFT_SERVER: ${{ inputs.openshift-server }}
        OPENSHIFT_TOKEN: ${{ inputs.openshift-token }}
        OPENSHIFT_CA_CERT: ${{ inputs.openshift-ca-cert }}
        OPENSHIFT_NAMESPACE: ${{ inputs.openshift-namespace }}
      run: |
        set -euo pipefail

        # Normalize variables
        OPENSHIFT_SERVER="$(printf '%s' "${OPENSHIFT_SERVER}" | tr -d '\r\n' | xargs)"
        OPENSHIFT_TOKEN="$(printf '%s' "${OPENSHIFT_TOKEN}" | tr -d '\r\n' | xargs)"
        OPENSHIFT_NAMESPACE="$(printf '%s' "${OPENSHIFT_NAMESPACE}" | tr -d '\r\n' | xargs)"
        OPENSHIFT_CA_CERT="$(printf '%s' "${OPENSHIFT_CA_CERT}" | tr -d '\r')"

        # Token format normalization
        OPENSHIFT_TOKEN="${OPENSHIFT_TOKEN#Bearer }"
        OPENSHIFT_TOKEN="${OPENSHIFT_TOKEN#bearer }"
        OPENSHIFT_TOKEN="${OPENSHIFT_TOKEN%\"}"
        OPENSHIFT_TOKEN="${OPENSHIFT_TOKEN#\"}"
        OPENSHIFT_TOKEN="${OPENSHIFT_TOKEN%\'}"
        OPENSHIFT_TOKEN="${OPENSHIFT_TOKEN#\'}"

        # Validation
        if [ -z "${OPENSHIFT_SERVER}" ] || [ -z "${OPENSHIFT_TOKEN}" ] || [ -z "${OPENSHIFT_NAMESPACE}" ]; then
          echo "ERROR: OPENSHIFT_SERVER, OPENSHIFT_TOKEN or OPENSHIFT_NAMESPACE is empty after normalization." >&2
          exit 1
        fi

        # Create kubeconfig file
        KUBECONFIG_FILE="${RUNNER_TEMP}/kubeconfig"

        if [ -n "${OPENSHIFT_CA_CERT}" ]; then
          CA_FILE="${RUNNER_TEMP}/openshift-ca.crt"
          printf '%s\n' "${OPENSHIFT_CA_CERT}" > "${CA_FILE}"
          TLS_LINE="certificate-authority: ${CA_FILE}"
        else
          TLS_LINE="insecure-skip-tls-verify: true"
        fi

        cat > "${KUBECONFIG_FILE}" <<EOF
        apiVersion: v1
        kind: Config
        clusters:
          - name: target
            cluster:
              server: ${OPENSHIFT_SERVER}
              ${TLS_LINE}
        users:
          - name: token-user
            user:
              token: ${OPENSHIFT_TOKEN}
        contexts:
          - name: target-context
            context:
              cluster: target
              user: token-user
              namespace: ${OPENSHIFT_NAMESPACE}
        current-context: target-context
        EOF

        chmod 600 "${KUBECONFIG_FILE}"

        # Output paths and export env
        echo "kubeconfig-file=${KUBECONFIG_FILE}" >> "${GITHUB_OUTPUT}"
        echo "kcmd-array=kubectl --kubeconfig ${KUBECONFIG_FILE}" >> "${GITHUB_OUTPUT}"

        # Export for use in shell
        echo "KUBECONFIG_FILE=${KUBECONFIG_FILE}" >> "${GITHUB_ENV}"
        echo "OPENSHIFT_NAMESPACE=${OPENSHIFT_NAMESPACE}" >> "${GITHUB_ENV}"
