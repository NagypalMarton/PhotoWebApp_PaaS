# Locust terhelésteszt OpenShift telepítése
#
# Alkalmazás:
#   oc apply -f locust/locust-openshift.yaml
#
# Web UI elérése:
#   oc get route locust   →  https://locust-<névtér>.apps.<klaszter>
#
# Ajánlott beállítások a terhelésteszthez:
#   Number of users : 20–50
#   Spawn rate      : 5 users/s
#   Host            : http://backend:5001
#
# Törlés:
#   oc delete -f locust/locust-openshift.yaml
# ─────────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust
  labels:
    app: locust
spec:
  replicas: 1
  selector:
    matchLabels:
      app: locust
  template:
    metadata:
      labels:
        app: locust
    spec:
      containers:
        - name: locust
          image: photowebapp-locust:latest
          ports:
            - containerPort: 8089
              name: web-ui
          env:
            - name: LOCUST_TARGET_HOST
              value: "http://backend:5001"
            - name: LOCUST_MODE
              value: "standalone"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: locust
  labels:
    app: locust
spec:
  selector:
    app: locust
  ports:
    - name: web-ui
      port: 8089
      targetPort: 8089
  type: ClusterIP
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: locust
spec:
  to:
    kind: Service
    name: locust
  port:
    targetPort: web-ui
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
