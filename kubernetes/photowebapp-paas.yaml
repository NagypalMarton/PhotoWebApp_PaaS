apiVersion: v1
kind: Namespace
metadata:
  name: photowebapp-paas
  labels:
    app.kubernetes.io/name: photowebapp
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
  annotations:
    project-name: PhotoWebApp_PAAS
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: photowebapp-backend-config
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: photowebapp
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
data:
  DB_HOST: mysql
  DB_PORT: "3306"
  DB_NAME: gallery
---
apiVersion: v1
kind: Secret
metadata:
  name: photowebapp-app-secret
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: photowebapp
type: Opaque
stringData:
  SECRET_KEY: CHANGE_ME_STRONG_APP_SECRET
    name: photowebapp-backend-secret
  DB_PASSWORD: CHANGE_ME_STRONG_DB_PASSWORD
---
apiVersion: v1
kind: Secret
metadata:
  name: photowebapp-db-secret
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: photowebapp
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: CHANGE_ME_STRONG_ROOT_PASSWORD
    name: photowebapp-db-pvc
  MYSQL_PASSWORD: CHANGE_ME_STRONG_DB_PASSWORD
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-data
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
  accessModes:
    - ReadWriteOnce
  resources:
    name: photowebapp-uploads-pvc
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-data
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: photowebapp-uploads
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
  accessModes:
    - ReadWriteMany
  resources:
    name: photowebapp-db-headless
      storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/component: database
  ports:
    - name: mysql
    name: photowebapp-db
      targetPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
spec:
  selector:
    app.kubernetes.io/component: database
  ports:
    - name: mysql
    name: photowebapp-db
      targetPort: 3306
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
spec:
  serviceName: mysql-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mysql
      app.kubernetes.io/component: database
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mysql
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: PhotoWebApp_PAAS
    spec:
      containers:
        - name: mysql
          image: mysql:8.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3306
              name: mysql
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: photowebapp-config
                  key: DB_NAME
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: photowebapp-db-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: photowebapp-db-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: photowebapp-db-secret
                  key: MYSQL_PASSWORD
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - mysqladmin ping -uroot -p"$MYSQL_ROOT_PASSWORD"
            initialDelaySeconds: 45
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: db-init
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
      volumes:
          persistentVolumeClaim:
            claimName: mysql-data
        - name: db-init
          configMap:
            name: photowebapp-db-init
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: photowebapp-db-init
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
      id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT,
      username VARCHAR(50) NOT NULL,
      password_hash VARCHAR(255) NOT NULL,
      created_at DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
      PRIMARY KEY (id),
      UNIQUE KEY uq_users_username (username)
    );

    CREATE TABLE IF NOT EXISTS photos (
      id BIGINT UNSIGNED NOT NULL AUTO_INCREMENT,
      owner_user_id BIGINT UNSIGNED NOT NULL,
      name VARCHAR(40) NOT NULL,
      upload_datetime DATETIME NOT NULL DEFAULT CURRENT_TIMESTAMP,
      PRIMARY KEY (id),
      KEY idx_photos_name (name),
      KEY idx_photos_upload_datetime (upload_datetime),
    name: photowebapp-backend
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: photowebapp-backend
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: photowebapp-backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: PhotoWebApp_PAAS
    spec:
      containers:
        - name: backend
          image: docker.io/nagypalmarton/photowebapp-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: photowebapp-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: photowebapp-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: photowebapp-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: photowebapp-app-secret
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: photowebapp-app-secret
                  key: DB_PASSWORD
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: photowebapp-app-secret
                  key: SECRET_KEY
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
              mountPath: /app/uploads
      volumes:
        - name: uploads
    name: photowebapp-backend
            claimName: uploads-data
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
spec:
  selector:
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: PhotoWebApp_PAAS
    spec:
      containers:
        - name: frontend
          image: docker.io/nagypalmarton/photowebapp-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
spec:
  selector:
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: photowebapp-paas
      name: photowebapp-backend
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
spec:
  scaleTargetRef:
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
---
apiVersion: autoscaling/v1
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-hpa
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
spec:
  scaleTargetRef:
    kind: Deployment
    name: frontend
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: frontend-pdb
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/component: web
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: photowebapp
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/name: photowebapp
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
spec:
  ingressClassName: nginx
  rules:
    - host: photowebapp.local
      http:
        paths:
          - path: /
            backend:
              service:
                name: frontend
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mysql-ingress-only-from-backend
  namespace: photowebapp-paas
  labels:
    app.kubernetes.io/part-of: PhotoWebApp_PAAS
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mysql
      app.kubernetes.io/component: database
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: backend
              app.kubernetes.io/component: api
      ports:
        - protocol: TCP
          port: 3306
